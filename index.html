<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfileLo</title>

<style>
*{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  box-sizing:border-box;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN BOX */
.container{
  width:320px;
  padding:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  transition:0.5s;
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0ea5e9;
}

/* PROFILE */
.profile{
  display:none;
  text-align:center;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#38bdf8;
  margin:10px auto;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
  color:black;
}

.card{
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container" id="loginBox">
  <h2>ProfileLo Login</h2>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<div class="container profile" id="profileBox">
  <div class="avatar" id="avatar">U</div>
  <h2 id="pname">User</h2>
  <p id="pemail">email</p>

  <div class="card">
    🚀 Welcome to ProfileLo Dashboard
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script>
function login(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;

  if(name === "" || email === ""){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("name", name);
  localStorage.setItem("email", email);

  showProfile();
}

function showProfile(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("profileBox").style.display="block";

  let name = localStorage.getItem("name");
  let email = localStorage.getItem("email");

  document.getElementById("pname").innerText = name;
  document.getElementById("pemail").innerText = email;
  document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();
}

function logout(){
  localStorage.clear();
  location.reload();
}

if(localStorage.getItem("name")){
  showProfile();
}
</script>

</body>
</html>
