<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - ProfileLo with Live Chat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  min-height: 100vh;
  color: white;
}

/* Navigation Bar */
.navbar {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 15px;
}

.logo {
  font-size: 1.5rem;
  font-weight: bold;
  background: linear-gradient(120deg, #38bdf8, #bae6fd);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

.nav-links {
  display: flex;
  gap: 15px;
  align-items: center;
  flex-wrap: wrap;
}

.nav-btn {
  background: transparent;
  border: 1px solid rgba(56,189,248,0.5);
  color: #38bdf8;
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.nav-btn:hover, .nav-btn.active {
  background: #38bdf8;
  color: #0f172a;
}

.profile-btn {
  background: linear-gradient(135deg, #38bdf8, #0284c7);
  border: none;
  color: white;
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
}

.logout-btn {
  background: rgba(239,68,68,0.8);
  border: none;
  color: white;
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
}

/* Main Container */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 30px;
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 30px;
}

/* Left Side */
.items-section {
  min-width: 0;
}

/* Right Side - Chat */
.chat-section {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  height: calc(100vh - 120px);
  position: sticky;
  top: 90px;
}

.chat-header {
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  border-radius: 20px 20px 0 0;
}

.chat-header h3 {
  color: #10b981;
  margin-bottom: 5px;
}

.online-count {
  font-size: 12px;
  color: #94a3b8;
}

.online-status {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #10b981;
  border-radius: 50%;
  margin-right: 6px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  display: flex;
  flex-direction: column;
  max-width: 85%;
}

.message.sent {
  align-self: flex-end;
}

.message.received {
  align-self: flex-start;
}

.message-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  word-wrap: break-word;
}

.message.sent .message-bubble {
  background: #38bdf8;
  color: #0f172a;
  border-bottom-right-radius: 4px;
}

.message.received .message-bubble {
  background: rgba(255,255,255,0.1);
  color: white;
  border-bottom-left-radius: 4px;
}

.message-info {
  font-size: 10px;
  margin: 4px 10px;
  color: #94a3b8;
}

.message-sender {
  font-weight: bold;
  margin-right: 8px;
  color: #38bdf8;
  font-size: 11px;
}

.chat-input-area {
  padding: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex;
  gap: 10px;
}

.chat-input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  color: white;
  outline: none;
}

.chat-input::placeholder {
  color: #94a3b8;
}

.chat-send-btn {
  background: #10b981;
  border: none;
  padding: 8px 20px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  color: white;
}

.chat-send-btn:hover {
  background: #059669;
}

/* Welcome Header */
.welcome-header {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

.category-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.category-tab {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8;
  padding: 8px 20px;
  border-radius: 40px;
  cursor: pointer;
  transition: 0.2s;
  font-weight: bold;
}

.category-tab:hover, .category-tab.active {
  background: #38bdf8;
  color: #0f172a;
}

.add-button {
  background: #10b981;
  border: none;
  color: white;
  padding: 8px 20px;
  border-radius: 40px;
  cursor: pointer;
  font-weight: bold;
  margin-left: auto;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.08);
  border-color: #38bdf8;
}

.card-category {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
  margin-bottom: 12px;
}

.category-website { background: #3b82f6; }
.category-bot { background: #10b981; }
.category-social { background: #ef4444; }
.category-tools { background: #8b5cf6; }
.category-other { background: #6b7280; }

.card-title {
  font-size: 1.2rem;
  margin-bottom: 8px;
}

.card-description {
  color: #94a3b8;
  font-size: 12px;
  margin-bottom: 12px;
}

.card-url {
  color: #38bdf8;
  font-size: 11px;
  word-break: break-all;
  margin-bottom: 12px;
}

.card-actions {
  display: flex;
  gap: 10px;
}

.open-btn {
  flex: 1;
  background: #38bdf8;
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.delete-btn {
  background: rgba(239,68,68,0.8);
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  width: 40px;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
}

.modal-content input, .modal-content select, .modal-content textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.9);
}

.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.save-modal-btn, .cancel-modal-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.save-modal-btn {
  background: #10b981;
  color: white;
}

.cancel-modal-btn {
  background: #64748b;
  color: white;
}

/* Responsive */
@media (max-width: 1024px) {
  .container {
    grid-template-columns: 1fr;
  }
  .chat-section {
    position: static;
    height: 500px;
  }
}

@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
  }
  .nav-links {
    justify-content: center;
  }
  .container {
    padding: 20px;
  }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">ProfileLo</div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="location.reload()">🏠 Dashboard</button>
    <button class="profile-btn" onclick="window.location.href='profile.html'">👤 My Profile</button>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="container">
  <!-- Left Side -->
  <div class="items-section">
    <div class="welcome-header">
      <h1>Welcome, <span id="welcomeName">User</span>! 👋</h1>
      <p>Manage your favorite websites and Telegram bots</p>
    </div>

    <div class="category-tabs">
      <button class="category-tab active" data-category="all">📌 All</button>
      <button class="category-tab" data-category="website">🌐 Websites</button>
      <button class="category-tab" data-category="bot">🤖 Telegram Bots</button>
      <button class="category-tab" data-category="social">📱 Social</button>
      <button class="category-tab" data-category="tools">🛠️ Tools</button>
      <button class="add-button" onclick="openAddModal()">+ Add Item</button>
    </div>

    <div id="cardsGrid" class="cards-grid"></div>
  </div>

  <!-- Right Side - Live Chat -->
  <div class="chat-section">
    <div class="chat-header">
      <h3>💬 Live Global Chat</h3>
      <div class="online-count">
        <span class="online-status"></span>
        <span id="onlineCount">1</span> user online
      </div>
    </div>
    
    <div id="chatMessages" class="chat-messages">
      <div style="text-align: center; color: #94a3b8; padding: 20px;">
        💡 Send a message to start chatting!
      </div>
    </div>
    
    <div class="chat-input-area">
      <input type="text" id="chatInput" class="chat-input" placeholder="Type your message..." maxlength="500">
      <button class="chat-send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="itemModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add New Item</h3>
    <input type="text" id="itemName" placeholder="Name">
    <select id="itemCategory">
      <option value="website">🌐 Website</option>
      <option value="bot">🤖 Telegram Bot</option>
      <option value="social">📱 Social Media</option>
      <option value="tools">🛠️ Tools</option>
      <option value="other">📦 Other</option>
    </select>
    <input type="text" id="itemUrl" placeholder="URL or Bot Username">
    <textarea id="itemDescription" placeholder="Description"></textarea>
    <div class="modal-buttons">
      <button class="save-modal-btn" onclick="saveItem()">Save</button>
      <button class="cancel-modal-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ============================================
// REAL-TIME CHAT USING BROADCAST CHANNEL API
// ============================================

const currentUser = localStorage.getItem("userName") || "Guest";
const userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);

// Create Broadcast Channel for real-time communication
const chatChannel = new BroadcastChannel('profilelo_chat');

let messages = [];

// Load messages from localStorage
function loadMessages() {
  const saved = localStorage.getItem("chat_messages_global");
  if (saved) {
    messages = JSON.parse(saved);
  } else {
    messages = [
      { id: Date.now(), userId: "system", userName: "System", message: "🎉 Welcome to Live Chat!", timestamp: Date.now() },
      { id: Date.now() + 1, userId: "system", userName: "System", message: "💬 Messages appear instantly across all tabs!", timestamp: Date.now() }
    ];
    saveMessages();
  }
  renderMessages();
}

// Save messages
function saveMessages() {
  if (messages.length > 100) messages = messages.slice(-100);
  localStorage.setItem("chat_messages_global", JSON.stringify(messages));
}

// Render messages
function renderMessages() {
  const container = document.getElementById("chatMessages");
  if (!container) return;
  
  if (messages.length === 0) {
    container.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 20px;">No messages yet. Start the conversation!</div>';
    return;
  }
  
  container.innerHTML = messages.map(msg => {
    if (msg.userId === "system") {
      return `<div style="text-align: center; margin: 5px 0;"><span style="background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; font-size: 11px;">${escapeHtml(msg.message)}</span></div>`;
    }
    
    const isOwn = msg.userId === userId;
    return `
      <div class="message ${isOwn ? 'sent' : 'received'}">
        <div class="message-bubble">
          ${!isOwn ? `<span class="message-sender">${escapeHtml(msg.userName)}</span><br>` : ''}
          ${escapeHtml(msg.message)}
        </div>
        <div class="message-info">
          ${new Date(msg.timestamp).toLocaleTimeString()}
        </div>
      </div>
    `;
  }).join('');
  
  container.scrollTop = container.scrollHeight;
}

// Send message
function sendMessage() {
  const input = document.getElementById("chatInput");
  const message = input.value.trim();
  
  if (!message) return;
  
  const newMessage = {
    id: Date.now(),
    userId: userId,
    userName: currentUser,
    message: message,
    timestamp: Date.now()
  };
  
  messages.push(newMessage);
  saveMessages();
  renderMessages();
  input.value = "";
  
  // Broadcast to other tabs
  chatChannel.postMessage({ type: 'new_message', message: newMessage });
  
  // Also send to Telegram as backup (optional)
  sendToTelegram(message);
}

// Listen for messages from other tabs
chatChannel.onmessage = (event) => {
  if (event.data.type === 'new_message') {
    // Add message from other tab
    messages.push(event.data.message);
    saveMessages();
    renderMessages();
    
    // Play notification sound (optional)
    if (event.data.message.userId !== userId) {
      // Visual notification
      document.title = "💬 New message!";
      setTimeout(() => { document.title = "Dashboard - ProfileLo"; }, 2000);
    }
  }
  
  if (event.data.type === 'update_online') {
    updateOnlineCount();
  }
};

// Online users tracking
let onlineUsers = new Set();

function updateOnlineCount() {
  // Add current user
  onlineUsers.add(userId);
  
  // Clean old users (older than 10 seconds)
  const now = Date.now();
  const userTimes = JSON.parse(localStorage.getItem("chat_online_users") || "{}");
  Object.keys(userTimes).forEach(uid => {
    if (now - userTimes[uid] > 10000) {
      delete userTimes[uid];
      onlineUsers.delete(uid);
    }
  });
  
  // Update current user time
  userTimes[userId] = now;
  localStorage.setItem("chat_online_users", JSON.stringify(userTimes));
  
  document.getElementById("onlineCount").innerText = Object.keys(userTimes).length;
}

// Send message to Telegram (optional feature)
async function sendToTelegram(message) {
  // This is optional - can send chat messages to Telegram too
  console.log(`[Chat] ${currentUser}: ${message}`);
}

// Optional: Send system message when user joins
function sendJoinMessage() {
  const joinMessage = {
    id: Date.now(),
    userId: "system",
    userName: "System",
    message: `✨ ${currentUser} joined the chat`,
    timestamp: Date.now()
  };
  messages.push(joinMessage);
  saveMessages();
  renderMessages();
  chatChannel.postMessage({ type: 'new_message', message: joinMessage });
}

// ============================================
// ITEMS MANAGEMENT
// ============================================

let items = [];
let currentEditId = null;
let currentCategory = "all";

function loadItems() {
  const saved = localStorage.getItem("userItems");
  if (saved) {
    items = JSON.parse(saved);
  } else {
    items = [
      { id: 1, name: "GitHub", category: "website", url: "https://github.com", description: "Code hosting platform" },
      { id: 2, name: "@BotFather", category: "bot", url: "https://t.me/botfather", description: "Official Telegram bot creator" },
      { id: 3, name: "Twitter", category: "social", url: "https://twitter.com", description: "Social media platform" },
      { id: 4, name: "VS Code", category: "tools", url: "https://code.visualstudio.com", description: "Code editor" }
    ];
    saveItems();
  }
  renderItems();
}

function saveItems() {
  localStorage.setItem("userItems", JSON.stringify(items));
}

function renderItems() {
  const grid = document.getElementById("cardsGrid");
  let filtered = currentCategory === "all" ? items : items.filter(i => i.category === currentCategory);
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div style="text-align: center; padding: 40px; color: #94a3b8;">No items. Click "Add Item" to get started!</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(item => `
    <div class="card">
      <div class="card-category category-${item.category}">${getCategoryIcon(item.category)} ${getCategoryName(item.category)}</div>
      <div class="card-title">${escapeHtml(item.name)}</div>
      <div class="card-description">${escapeHtml(item.description || 'No description')}</div>
      <div class="card-url">${escapeHtml(item.url)}</div>
      <div class="card-actions">
        <button class="open-btn" onclick="openItem('${item.url}')">🔗 Open</button>
        <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
      </div>
    </div>
  `).join('');
}

function getCategoryIcon(cat) {
  const icons = { website: "🌐", bot: "🤖", social: "📱", tools: "🛠️", other: "📦" };
  return icons[cat] || "📌";
}

function getCategoryName(cat) {
  const names = { website: "Website", bot: "Telegram Bot", social: "Social", tools: "Tools", other: "Other" };
  return names[cat] || cat;
}

function openItem(url) {
  if (url.startsWith('@')) {
    window.open(`https://t.me/${url.substring(1)}`, '_blank');
  } else {
    window.open(url, '_blank');
  }
}

function openAddModal() {
  currentEditId = null;
  document.getElementById("modalTitle").innerText = "Add New Item";
  document.getElementById("itemName").value = "";
  document.getElementById("itemCategory").value = "website";
  document.getElementById("itemUrl").value = "";
  document.getElementById("itemDescription").value = "";
  document.getElementById("itemModal").style.display = "flex";
}

function saveItem() {
  const name = document.getElementById("itemName").value.trim();
  const category = document.getElementById("itemCategory").value;
  const url = document.getElementById("itemUrl").value.trim();
  const description = document.getElementById("itemDescription").value.trim();
  
  if (!name || !url) {
    alert("Please fill name and URL");
    return;
  }
  
  if (currentEditId) {
    const index = items.findIndex(i => i.id === currentEditId);
    if (index !== -1) {
      items[index] = { ...items[index], name, category, url, description };
    }
  } else {
    items.push({ id: Date.now(), name, category, url, description });
  }
  
  saveItems();
  renderItems();
  closeModal();
}

function deleteItem(id) {
  if (confirm("Delete this item?")) {
    items = items.filter(i => i.id !== id);
    saveItems();
    renderItems();
  }
}

function closeModal() {
  document.getElementById("itemModal").style.display = "none";
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================
// GENERAL FUNCTIONS
// ============================================

function loadUserData() {
  const name = localStorage.getItem("userName") || "User";
  document.getElementById("welcomeName").innerText = name;
}

function logout() {
  // Send leave message
  const leaveMessage = {
    id: Date.now(),
    userId: "system",
    userName: "System",
    message: `👋 ${currentUser} left the chat`,
    timestamp: Date.now()
  };
  messages.push(leaveMessage);
  saveMessages();
  chatChannel.postMessage({ type: 'new_message', message: leaveMessage });
  
  localStorage.removeItem("isLoggedIn");
  window.location.href = "index.html";
}

// ============================================
// INITIALIZATION
// ============================================

if (localStorage.getItem("isLoggedIn") !== "true") {
  window.location.href = "index.html";
}

loadUserData();
loadItems();
loadMessages();

// Update online status every 5 seconds
updateOnlineCount();
setInterval(() => {
  updateOnlineCount();
  chatChannel.postMessage({ type: 'update_online' });
}, 5000);

// Send join message (only once)
if (!sessionStorage.getItem("join_sent")) {
  setTimeout(() => {
    sendJoinMessage();
    sessionStorage.setItem("join_sent", "true");
  }, 500);
}

// Enter key to send
document.getElementById("chatInput")?.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

// Category filters
document.querySelectorAll('.category-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCategory = tab.dataset.category;
    renderItems();
  });
});

console.log("%c💬 LIVE CHAT ACTIVE! Messages appear instantly across all tabs!", "color: #10b981; font-size: 14px");
console.log("%c📝 Open this page in multiple tabs to test real-time chat", "color: #38bdf8; font-size: 12px");
</script>
</body>
</html>
